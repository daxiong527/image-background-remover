<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图片背景移除工具 - AI 智能抠图</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }

    .glass-effect {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .dropzone {
      border: 3px dashed rgba(102, 126, 234, 0.3);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      background: linear-gradient(135deg, rgba(255,255,255,0.8) 0%, rgba(248,250,252,0.8) 100%);
    }

    .dropzone:hover {
      border-color: rgba(102, 126, 234, 0.6);
      transform: translateY(-2px);
      box-shadow: 0 20px 40px rgba(102, 126, 234, 0.15);
    }

    .dropzone.active {
      border-color: #667eea;
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
      transform: scale(1.02);
    }

    .preview-card {
      background: white;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
      transition: all 0.3s ease;
    }

    .preview-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 35px 60px -12px rgba(0, 0, 0, 0.2);
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 40px rgba(102, 126, 234, 0.4);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .feature-card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      transition: all 0.3s ease;
    }

    .feature-card:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: translateY(-5px);
    }

    .gradient-text {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .pulse-animation {
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .spinner {
      border: 3px solid rgba(102, 126, 234, 0.1);
      border-top-color: #667eea;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .checkered-bg {
      background-image: 
        linear-gradient(45deg, #e5e7eb 25%, transparent 25%),
        linear-gradient(-45deg, #e5e7eb 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #e5e7eb 75%),
        linear-gradient(-45deg, transparent 75%, #e5e7eb 75%);
      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
    }

    .floating {
      animation: floating 3s ease-in-out infinite;
    }

    @keyframes floating {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }

    .glow {
      box-shadow: 0 0 30px rgba(102, 126, 234, 0.5);
    }
  </style>
</head>
<body>
  <!-- Background Decoration -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div class="absolute -top-40 -right-40 w-80 h-80 bg-purple-300 rounded-full mix-blend-multiply filter blur-xl opacity-30 floating" style="animation-delay: 0s;"></div>
    <div class="absolute -bottom-40 -left-40 w-80 h-80 bg-indigo-300 rounded-full mix-blend-multiply filter blur-xl opacity-30 floating" style="animation-delay: 1s;"></div>
    <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-pink-300 rounded-full mix-blend-multiply filter blur-xl opacity-20 floating" style="animation-delay: 2s;"></div>
  </div>

  <div class="relative container mx-auto px-4 py-12 max-w-6xl">
    <!-- Header -->
    <header class="text-center mb-12">
      <div class="inline-block mb-4">
        <div class="glass-effect rounded-2xl px-6 py-3 inline-block">
          <span class="text-purple-600 font-semibold">✨ AI 驱动</span>
        </div>
      </div>
      <h1 class="text-6xl font-extrabold text-white mb-4 drop-shadow-lg">
        图片背景移除
      </h1>
      <p class="text-xl text-purple-100 max-w-2xl mx-auto">
        上传图片，AI 自动识别并移除背景，一键下载透明 PNG
      </p>
    </header>

    <!-- Upload Area -->
    <div class="glass-effect rounded-3xl shadow-2xl p-10 mb-10">
      <div 
        id="dropzone" 
        class="dropzone rounded-2xl p-16 text-center cursor-pointer"
      >
        <div class="space-y-6">
          <div class="inline-block p-6 bg-gradient-to-br from-purple-100 to-indigo-100 rounded-full">
            <svg class="h-20 w-20 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
          </div>
          <div>
            <p class="text-2xl font-semibold text-gray-700">拖拽图片到此处，或点击上传</p>
            <p class="text-base text-gray-500 mt-3">支持 PNG, JPG, JPEG • 最大 10MB</p>
          </div>
        </div>
        <input type="file" id="fileInput" accept="image/*" class="hidden">
      </div>

      <!-- Progress -->
      <div id="progress" class="hidden mt-8">
        <div class="flex items-center justify-center space-x-4 mb-4">
          <div class="spinner"></div>
          <p class="text-lg font-medium text-gray-700">AI 正在处理中...</p>
        </div>
        <div class="bg-gray-200 rounded-full h-3 overflow-hidden">
          <div id="progressBar" class="h-full rounded-full transition-all duration-500" style="width: 0%; background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);"></div>
        </div>
        <p id="progressText" class="text-center text-sm text-gray-600 mt-3">正在移除背景，请稍候...</p>
      </div>

      <!-- Error Message -->
      <div id="errorMessage" class="hidden mt-6 p-5 bg-red-50 border-l-4 border-red-500 rounded-lg">
        <div class="flex items-start">
          <svg class="h-6 w-6 text-red-500 mr-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          <p class="text-red-700 font-medium"></p>
        </div>
      </div>
    </div>

    <!-- Preview Area -->
    <div id="previewArea" class="hidden">
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
        <!-- Original -->
        <div class="preview-card">
          <div class="bg-gradient-to-br from-purple-500 to-indigo-600 px-6 py-4">
            <h3 class="text-lg font-bold text-white flex items-center">
              <svg class="h-5 w-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
              </svg>
              原图
            </h3>
          </div>
          <div class="p-6">
            <div class="aspect-square bg-gray-100 rounded-xl overflow-hidden checkered-bg">
              <img id="originalImage" class="w-full h-full object-contain" alt="Original">
            </div>
          </div>
        </div>

        <!-- Processed -->
        <div class="preview-card">
          <div class="bg-gradient-to-br from-green-500 to-emerald-600 px-6 py-4">
            <h3 class="text-lg font-bold text-white flex items-center">
              <svg class="h-5 w-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
              去背后
            </h3>
          </div>
          <div class="p-6">
            <div class="aspect-square bg-gray-100 rounded-xl overflow-hidden checkered-bg">
              <img id="processedImage" class="w-full h-full object-contain" alt="Processed">
            </div>
            <button id="downloadBtn" class="btn-primary w-full mt-6 text-white font-bold py-4 px-6 rounded-xl text-lg flex items-center justify-center">
              <svg class="h-6 w-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
              </svg>
              下载透明 PNG
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Features -->
    <div class="mt-16 grid grid-cols-1 md:grid-cols-3 gap-6">
      <div class="feature-card rounded-2xl p-8 text-center">
        <div class="text-5xl mb-4 floating">⚡</div>
        <h3 class="text-xl font-bold text-white mb-3">快速处理</h3>
        <p class="text-purple-100">AI 智能识别，秒级完成背景移除</p>
      </div>
      <div class="feature-card rounded-2xl p-8 text-center">
        <div class="text-5xl mb-4 floating" style="animation-delay: 0.5s;">🔒</div>
        <h3 class="text-xl font-bold text-white mb-3">隐私保护</h3>
        <p class="text-purple-100">图片处理后立即删除，安全无忧</p>
      </div>
      <div class="feature-card rounded-2xl p-8 text-center">
        <div class="text-5xl mb-4 floating" style="animation-delay: 1s;">🆓</div>
        <h3 class="text-xl font-bold text-white mb-3">免费使用</h3>
        <p class="text-purple-100">基于 Cloudflare 全球 CDN 加速</p>
      </div>
    </div>

    <!-- Footer -->
    <footer class="text-center mt-16 text-purple-200">
      <p class="text-sm">
        Powered by Cloudflare Pages • AI Background Remover
      </p>
    </footer>
  </div>

  <script type="module" src="/app.js"></script>
</body>
</html>
