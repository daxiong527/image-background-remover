<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图片背景移除工具</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .dropzone {
      border: 2px dashed #cbd5e1;
      transition: all 0.3s ease;
    }
    .dropzone.active {
      border-color: #3b82f6;
      background-color: #eff6ff;
    }
    .preview-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    @media (max-width: 768px) {
      .preview-container {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100">
  <div class="container mx-auto px-4 py-8 max-w-4xl">
    <!-- Header -->
    <header class="text-center mb-8">
      <h1 class="text-4xl font-bold text-gray-800 mb-2">🖼️ 图片背景移除</h1>
      <p class="text-gray-600">上传图片，自动移除背景，一键下载</p>
    </header>

    <!-- Upload Area -->
    <div class="bg-white rounded-xl shadow-lg p-8 mb-8">
      <div 
        id="dropzone" 
        class="dropzone rounded-lg p-12 text-center cursor-pointer"
      >
        <div class="space-y-4">
          <svg class="mx-auto h-16 w-16 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
          </svg>
          <div>
            <p class="text-lg text-gray-600">拖拽图片到此处，或点击上传</p>
            <p class="text-sm text-gray-500 mt-1">支持 PNG, JPG, JPEG (最大 10MB)</p>
          </div>
        </div>
        <input type="file" id="fileInput" accept="image/*" class="hidden">
      </div>

      <!-- Progress -->
      <div id="progress" class="hidden mt-6">
        <div class="bg-gray-200 rounded-full h-2.5">
          <div id="progressBar" class="bg-blue-600 h-2.5 rounded-full transition-all duration-300" style="width: 0%"></div>
        </div>
        <p id="progressText" class="text-center text-sm text-gray-600 mt-2">处理中...</p>
      </div>

      <!-- Error Message -->
      <div id="errorMessage" class="hidden mt-4 p-4 bg-red-50 border border-red-200 rounded-lg">
        <p class="text-red-600"></p>
      </div>
    </div>

    <!-- Preview Area -->
    <div id="previewArea" class="hidden">
      <div class="preview-container">
        <!-- Original -->
        <div class="bg-white rounded-xl shadow-lg p-4">
          <h3 class="text-lg font-semibold mb-3 text-gray-700">原图</h3>
          <div class="aspect-square bg-gray-100 rounded-lg overflow-hidden">
            <img id="originalImage" class="w-full h-full object-contain" alt="Original">
          </div>
        </div>

        <!-- Processed -->
        <div class="bg-white rounded-xl shadow-lg p-4">
          <h3 class="text-lg font-semibold mb-3 text-gray-700">去背后</h3>
          <div class="aspect-square bg-gray-100 rounded-lg overflow-hidden" style="background-image: linear-gradient(45deg, #ccc 25%, transparent 25%), linear-gradient(-45deg, #ccc 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #ccc 75%), linear-gradient(-45deg, transparent 75%, #ccc 75%); background-size: 20px 20px; background-position: 0 0, 0 10px, 10px -10px, -10px 0px;">
            <img id="processedImage" class="w-full h-full object-contain" alt="Processed">
          </div>
          <button id="downloadBtn" class="w-full mt-4 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-lg transition-colors">
            📥 下载图片
          </button>
        </div>
      </div>
    </div>

    <!-- Features -->
    <div class="mt-12 grid grid-cols-1 md:grid-cols-3 gap-6">
      <div class="bg-white rounded-lg shadow p-6 text-center">
        <div class="text-3xl mb-3">⚡</div>
        <h3 class="font-semibold text-gray-800">快速处理</h3>
        <p class="text-sm text-gray-600 mt-2">AI 自动识别，秒级完成</p>
      </div>
      <div class="bg-white rounded-lg shadow p-6 text-center">
        <div class="text-3xl mb-3">🔒</div>
        <h3 class="font-semibold text-gray-800">隐私保护</h3>
        <p class="text-sm text-gray-600 mt-2">图片不落盘，处理完即删</p>
      </div>
      <div class="bg-white rounded-lg shadow p-6 text-center">
        <div class="text-3xl mb-3">🆓</div>
        <h3 class="font-semibold text-gray-800">免费使用</h3>
        <p class="text-sm text-gray-600 mt-2">基于 Cloudflare 免费额度</p>
      </div>
    </div>
  </div>

  <script type="module" src="/app.js"></script>
</body>
</html>
